[package]
name = "locusfs-bin"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "locusfs"
path = "src/main.rs"

[dependencies]
futures-util = { workspace = true }
libc = "0.2"
libloading = "0.8"
locusfs-graph = { path = "../graph", default-features = false, features = ["dynamic"] }
locusfs-fuse = { path = "../fuse" }
locusfs-plugin-api = { path = "../plugins/api" }
locusfs-watch = { path = "../watch" }
perfetto-sdk = "1.0.2"
serde = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["fs", "io-std", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
toml = { workspace = true }
tracing = "0.1"
tracing-perfetto-sdk = "1.0.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
zbus = { version = "5.16", default-features = false, features = ["tokio"] }
